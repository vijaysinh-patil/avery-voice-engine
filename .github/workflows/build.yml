name: Build add-on

on:
  push:
    branches: [main]
    paths:
      - "avery-voice-engine/**"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/vijaysinh-patil/avery-voice-engine

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: version
        run: echo "version=$(grep '^version:' avery-voice-engine/config.yaml | awk '{print $2}' | tr -d '\"')" >> $GITHUB_OUTPUT
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: avery-voice-engine
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
